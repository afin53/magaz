<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Банк Bobrisk</title>
    <style>
        :root { --primary: #4F46E5; --bg: #F3F4F6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .bank-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; border-top: 5px solid var(--primary); }
        h2 { margin-top: 0; color: #111827; }
        .status-text { font-size: 18px; color: #4B5563; margin: 20px 0; min-height: 27px; font-weight: bold; transition: opacity 0.3s ease; }
        .card-result { font-size: 24px; color: var(--primary); font-weight: bold; margin: 20px 0; background: #EEF2FF; padding: 15px; border-radius: 10px; display: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 20px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: #4338CA; }
        .btn:disabled { background: #9CA3AF; cursor: not-allowed; }
        .btn-back { background: #10B981; margin-top: 15px; display: none; }
        .btn-back:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="bank-card">
        <h2>🏦 Банк Bobrisk</h2>
        <p>Національний бобровий резерв</p>
        
        <button id="startBtn" class="btn" onclick="startGeneration()">Згенерувати картку</button>
        
        <div id="status" class="status-text"></div>
        <div id="result" class="card-result"></div>
        
        <!-- Кнопка повертає нас одразу у кошик! -->
        <button id="backBtn" class="btn btn-back" onclick="window.location.href='index.html#cart'">🛒 Повернутися до сплати</button>
    </div>

    <script>
        function startGeneration() {
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const backBtn = document.getElementById('backBtn');
            
            btn.disabled = true;
            btn.innerText = "Процес пішов...";
            
            // Таймінги для кожного повідомлення (в мілісекундах)
            const stages = [
                { time: 0, text: "Підготовка..." },
                { time: 2000, text: "Робимо карточку..." },
                { time: 4000, text: "Запілюємо..." },
                { time: 6000, text: "Реєструємо..." },
                { time: 8000, text: "Даємо!" }
            ];

            // Запускаємо зміну статусів
            stages.forEach(stage => {
                setTimeout(() => {
                    status.style.opacity = 0; // ефект згасання
                    setTimeout(() => {
                        status.innerText = stage.text;
                        status.style.opacity = 1; // ефект появи
                    }, 200);
                }, stage.time);
            });

            // На 10-тій секунді видаємо результат
            setTimeout(() => {
                let num = Math.floor(100000 + Math.random() * 900000);
                let code = "bobrouser-" + num;
                
                // Зберігаємо в пам'ять
                localStorage.setItem('bobcard', code);
                
                status.style.display = "none";
                btn.style.display = "none";
                
                result.innerText = code;
                result.style.display = "block";
                
                backBtn.style.display = "block"; // Показуємо кнопку повернення
            }, 10000);
        }
    </script>

</body>
</html>
